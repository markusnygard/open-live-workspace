services:
  couchdb:
    image: couchdb:3.5.2
    container_name: open-live-local-db
    restart: unless-stopped
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-password}
    volumes:
      - couchdb-data:/opt/couchdb/data
    ports:
      - "0.0.0.0:5984:5984"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://${COUCHDB_USER:-admin}:${COUCHDB_PASSWORD:-password}@localhost:5984/_up"]
      interval: 5s
      timeout: 3s
      retries: 10

  strom:
    # Use STROM_IMAGE to switch to NDI-enabled image:
    #   STROM_IMAGE=open-live-strom-ndi:0.6.6 docker compose up -d
    # For NDI multicast to work, set network_mode to host:
    #   STROM_NETWORK_MODE=host STROM_IMAGE=open-live-strom-ndi:0.6.6 docker compose up -d
    image: ${STROM_IMAGE:-eyevinntechnology/strom-full:0.6.6}
    container_name: open-live-local-strom
    network_mode: ${STROM_NETWORK_MODE:-}
    privileged: true
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Stockholm}
      - STROM_API_KEY=${STROM_API_KEY}
      - STROM_ADMIN_USER=${STROM_ADMIN_USER:-admin}
      - STROM_ADMIN_PASSWORD_HASH=${STROM_ADMIN_PASSWORD_HASH}
      - STROM_SERVER_ICE_SERVERS=stun:stun.l.google.com:19302
      - NVIDIA_DRIVER_CAPABILITIES=all
    # GPU acceleration (requires nvidia-container-toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    cap_add:
      - SYS_NICE
    volumes:
      - strom-data:/data
      - /dev/blackmagic:/dev/blackmagic
      - /usr/lib/libDeckLinkAPI.so:/lib/libDeckLinkAPI.so:ro
      - /usr/lib/libDeckLinkPreviewAPI.so:/lib/libDeckLinkPreviewAPI.so:ro
      - /usr/lib/blackmagic:/lib/blackmagic:ro
    devices:
      - /dev/blackmagic:/dev/blackmagic
    ports:
      - "0.0.0.0:8080:8080"
      - "0.0.0.0:5000:5000/udp"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  open-live:
    image: node:23-slim
    container_name: open-live-local-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../backend:/app
    # host-gateway lets bridge containers reach host-mode containers at host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PORT=8000
      - COUCHDB_URL=http://${COUCHDB_USER:-admin}:${COUCHDB_PASSWORD:-password}@couchdb:5984
      - COUCHDB_NAME=open-live
      - CORS_ORIGIN=*
      - STROM_URL=http://${STROM_HOST:-strom}:8080
      - STROM_PUBLIC_URL=${STROM_PUBLIC_URL:-http://localhost:8080}
      - STROM_AUTH_MODE=direct
      - STROM_TOKEN=${STROM_API_KEY:-}
      - SDI_DEVICE_COUNT=${SDI_DEVICE_COUNT:-0}
      - LOG_LEVEL=info
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install &&
      sleep 5 &&
      pnpm exec tsx src/main.ts --host"
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      couchdb:
        condition: service_healthy
      strom:
        condition: service_healthy

  open-live-studio:
    image: node:23-slim
    container_name: open-live-local-studio
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../frontend:/app
    environment:
      # Set IP=<your-lan-ip> to make Studio work from other machines on the network
      - OPEN_LIVE_URL=http://${IP:-localhost}:8000
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install &&
      pnpm exec vite --host 0.0.0.0 --port 5173 --strictPort"
    ports:
      - "0.0.0.0:3000:5173"
    depends_on:
      - open-live

volumes:
  couchdb-data:
  strom-data:
