services:
  couchdb:
    image: couchdb:3.3
    container_name: open-live-local-db
    restart: unless-stopped
    environment:
      - COUCHDB_USER=${COUCHDB_USER:-admin}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD:-password}
    volumes:
      - couchdb-data:/opt/couchdb/data
    ports:
      - "0.0.0.0:5984:5984"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://${COUCHDB_USER:-admin}:${COUCHDB_PASSWORD:-password}@localhost:5984/_up"]
      interval: 5s
      timeout: 3s
      retries: 10

  strom:
    image: eyevinntechnology/strom-full:latest
    container_name: open-live-local-strom
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Stockholm}
      - STROM_API_KEY=${STROM_API_KEY}
      - STROM_SERVER_ICE_SERVERS=stun:stun.l.google.com:19302
    volumes:
      - strom-data:/data
    ports:
      - "0.0.0.0:8080:8080"
      - "0.0.0.0:5000:5000/udp"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  open-live:
    image: node:23-slim
    container_name: open-live-local-backend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../backend:/app
    environment:
      - PORT=8000
      - COUCHDB_URL=http://${COUCHDB_USER:-admin}:${COUCHDB_PASSWORD:-password}@couchdb:5984
      - COUCHDB_NAME=open-live
      - CORS_ORIGIN=*
      - STROM_URL=http://strom:8080
      - STROM_AUTH_MODE=${STROM_API_KEY:+"direct"}
      - STROM_TOKEN=${STROM_API_KEY}
      - LOG_LEVEL=info
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install &&
      sleep 5 &&
      pnpm exec tsx src/main.ts --host"
    ports:
      - "0.0.0.0:8000:8000"
    depends_on:
      couchdb:
        condition: service_healthy
      strom:
        condition: service_healthy

  open-live-studio:
    image: node:23-slim
    container_name: open-live-local-studio
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../frontend:/app
    environment:
      - VITE_OPEN_LIVE_API_URL=http://${IP:-localhost}:8000/api/v1
    command: >
      sh -c "corepack enable &&
      corepack prepare pnpm@latest --activate &&
      pnpm install &&
      pnpm exec vite --host 0.0.0.0 --port 5173 --strictPort"
    ports:
      - "0.0.0.0:3000:5173"
    depends_on:
      - open-live

volumes:
  couchdb-data:
  strom-data:
